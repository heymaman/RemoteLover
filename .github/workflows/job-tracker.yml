name: Job Tracker Bot

on:
  schedule:
    # Runs every 2 hours — adjust as you like
    - cron: "0 */2 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  track-jobs:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Restore seen-jobs cache ─────────────────────
      # This is the "memory" of jobs already seen.
      # Without this, every run would re-alert all jobs.
      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ runner.os }}
          restore-keys: |
            seen-jobs-

      # ── 3. Set up Python ───────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 4. Install dependencies ────────────────────────
      - name: Install dependencies
        run: pip install requests

      # ── 5. Run scraper ─────────────────────────────────
      - name: Run Job Tracker
        env:
          # ── Telegram ──────────────────────────────────
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}

          # ── Discord ───────────────────────────────────
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}

          # ── WhatsApp (Twilio) ─────────────────────────
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO:   ${{ secrets.TWILIO_WHATSAPP_TO }}

          # ── Email (Gmail / any SMTP) ──────────────────
          SMTP_HOST:  ${{ secrets.SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.SMTP_PORT }}
          SMTP_USER:  ${{ secrets.SMTP_USER }}
          SMTP_PASS:  ${{ secrets.SMTP_PASS }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}

          # ── Optional keyword filter ───────────────────
          # Leave empty to get ALL jobs.
          # Examples: "engineer,backend,python" or "ml,research"
          JOB_KEYWORDS: ${{ secrets.JOB_KEYWORDS }}

        run: python scripts/scraper.py

      # ── 6. Persist seen-jobs cache ─────────────────────
      - name: Save seen jobs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ runner.os }}-${{ github.run_id }}
